name: mahjong_tracker
description: Application de suivi des scores de Mah-Jong en temps réel.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0
  flutter_riverpod: ^2.5.1
  intl: ^0.19.0
  collection: ^1.18.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/app_icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/tile_catalog.json
    - assets/tiles/
    - assets/app_icon/
